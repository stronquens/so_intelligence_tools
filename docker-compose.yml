services:
  ollama:
    image: ollama/ollama:0.30.5
    container_name: so-intelligence-tools-ollama
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: so-intelligence-tools-api
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      LOCAL_INFERENCE_API_HOST: 0.0.0.0
      LOCAL_INFERENCE_API_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-hf.co/unsloth/gemma-4-E2B-it-GGUF:UD-Q4_K_XL}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-180}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    ports:
      - "8000:8000"

volumes:
  ollama_models:
