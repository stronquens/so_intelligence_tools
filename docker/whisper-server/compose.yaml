services:
  whisper:
    image: ${WHISPER_IMAGE:-hwdsl2/whisper-server:latest}
    container_name: whisper-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WHISPER_PORT:-9000}:9000"
    volumes:
      - whisper-data:/var/lib/whisper
    env_file:
      - .env

volumes:
  whisper-data:
